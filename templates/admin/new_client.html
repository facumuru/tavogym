{% extends "base.html" %}
{% block title %}Nuevo Cliente - TAVOGYM{% endblock %}

{% block content %}
<div class="page-header">
    <a href="{{ url_for('admin_clients') }}" class="back-link">← Volver</a>
    <h1>Nuevo cliente</h1>
</div>

<form method="POST" class="form-card">
    <div class="form-group">
        <label for="name">Nombre completo *</label>
        <input type="text" id="name" name="name" placeholder="Ej: Juan Pérez" required>
    </div>
    <div class="form-group">
        <label for="username">Usuario *</label>
        <input type="text" id="username" name="username" placeholder="Ej: juanperez" required pattern="[a-z0-9_]+" title="Solo letras minúsculas, números y guión bajo">
        <small class="form-hint">Sin espacios. El cliente usará esto para ingresar.</small>
    </div>
    <div class="form-group">
        <label for="password">Contraseña *</label>
        <input type="text" id="password" name="password" placeholder="Contraseña inicial" required minlength="4">
        <small class="form-hint">Compartila con el cliente para que pueda ingresar.</small>
    </div>
    <div class="form-group">
        <label for="phone">Teléfono (opcional)</label>
        <input type="tel" id="phone" name="phone" placeholder="Ej: 11 1234-5678">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Registrar cliente</button>
</form>
{% endblock %}
